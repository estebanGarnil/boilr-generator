project:
  name: my_app
  type: fullstack_web
  version: "1.0.0"

modules:
  - key: postgres
    variables:
      db_name: my_app
      db_user: my_app
      db_password: password
      db_port: 5432

  - key: django
    variables:
      project_name: my_app
      secret_key: dev-secret
      django_settings_module: config.settings
      allowed_hosts:
        - localhost
        - 127.0.0.1
      backend_port: 8000
      debug: true
      db_engine: postgresql
      db_host: db
      db_port: 5432
      db_name: my_app
      db_user: my_app
      db_password: password

    options:
      rest_framework: true
      cors: true